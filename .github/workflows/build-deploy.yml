name: Lint-Prettier-Prettier:verify-Tests-CypressTests-Build-Purgecss-Deploy

on:
  pull_request:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      - name: Install npm dependencies
        run: |
          npm install
      - name: Prettier
        run: |
          npm run prettier
      - name: Prettier Verify
        run: |
          npm run prettier:verify
      - name: Lint
        run: |
          npm run lint
      # - name: Cypress Test // bug-doesn't return back to cli,
      #   run: |
      #     npm run e2e:ci
      - name: Test
        run: |
          npm run test
      - name: Build
        run: |
          npm run final-build
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
